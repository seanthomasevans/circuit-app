<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Circuit</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="app.css">
</head>
<body>

<div id="gate">
  <div class="box">
    <div class="brand">Circuit<span>.</span></div>
    <p>Sign in to unlock and sync.</p>
    <input id="email" type="email" autocomplete="username" inputmode="email" placeholder="Email" autocapitalize="off" spellcheck="false">
    <input id="pw" type="password" autocomplete="current-password" inputmode="text" placeholder="Password">
    <button id="unlock">Sign in</button>
    <div class="err" id="gerr"></div>
  </div>
</div>

<div id="app" class="hide">
  <div class="topbar"><div class="wrap">
    <div class="b">Circuit<span>.</span></div>
    <div class="ctx" id="ctx"></div>
  </div></div>
  <main class="wrap"><div id="view" class="view"></div></main>
  <nav class="tabs">
    <div class="rail-brand">Circuit<span>.</span></div>
    <a data-route="today"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span class="tl">Today</span></a>
    <a data-route="schedule"><svg class="ic" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg><span class="tl">Schedule</span></a>
    <a data-route="people"><svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16 8.2a3 3 0 0 1 0 5.6M17 14.5c2.4.4 4 2.3 4 4.5"/></svg><span class="tl">People</span></a>
    <a data-route="prep"><svg class="ic" viewBox="0 0 24 24"><path d="M6 8V6a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v2"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M9 12h6"/></svg><span class="tl">Prep</span></a>
    <a data-route="money"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10.5h18M16 14.5h2.4"/></svg><span class="tl">Money</span></a>
    <a data-route="knowledge" class="sec-nav"><svg class="ic" viewBox="0 0 24 24"><path d="M4 5h16v9l-3 5H7l-3-5z"/><path d="M4 14h4l1.6 2.6h4.8L16 14h4"/></svg><span class="tl">Knowledge</span></a>
    <a data-route="agent" class="sec-nav"><svg class="ic" viewBox="0 0 24 24"><path d="M4 5h16v11H9l-4 3v-3H4z"/><path d="M8.5 10h7M8.5 13h4.5"/></svg><span class="tl">Agent</span></a>
  </nav>
  <button class="fab" id="fab" aria-label="Ask the agent"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg></button>
</div>

<div id="scrim"></div>
<div id="sheet"><div class="grab"></div><div class="sc" id="sheetc"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
// Register the worker (network-first, versioned per build). It skip-waits on install and claims
// the page on activate; controllerchange then reloads once so every deploy lands automatically.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(r => { setInterval(() => r.update(), 60000); }).catch(() => {});
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; location.reload(); }
  });
}
</script>
</body>
</html>
